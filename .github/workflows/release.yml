name: Build and release Windows exe

# Builds the Windows executable on a GitHub-hosted Windows runner and publishes
# it as a GitHub Release asset. Triggered by pushing a version tag (vX.Y.Z),
# which is exactly what the in-app auto-updater looks for. No local Windows
# machine is required to ship an update.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}  # allow manual builds from the Actions tab

permissions:
  contents: write  # required to create the release

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.11.1

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Verify version tag matches version.py
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart("v")
          $code = (Select-String -Path version.py -Pattern '__version__\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          Write-Host "Tag version: $tag / version.py: $code"
          if ($tag -ne $code) {
            Write-Error "Tag ($tag) does not match version.py ($code). Bump version.py before tagging."
            exit 1
          }

      - name: Build single-file executable
        # The bundled PySide6 hook pulls in the Qt modules actually imported
        # (including QtPdf / QtPdfWidgets) plus their required plugins, so no
        # blanket --collect-all is needed. Keeps the exe lean and fast to start.
        run: >
          pyinstaller --onefile --windowed --name "iPhoneLabelPrinter"
          --add-data "assets;assets"
          app.py

      - name: Smoke-check the build output
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/iPhoneLabelPrinter.exe")) {
            Write-Error "Build did not produce dist/iPhoneLabelPrinter.exe"
            exit 1
          }
          Get-Item "dist/iPhoneLabelPrinter.exe" | Select-Object Name, Length

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: iPhoneLabelPrinter-windows
          path: dist/iPhoneLabelPrinter.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release create "${{ github.ref_name }}" `
            "dist/iPhoneLabelPrinter.exe" `
            --title "${{ github.ref_name }}" `
            --generate-notes
