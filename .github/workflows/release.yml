name: Release Tauri app

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Check tag matches Tauri version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          APP_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$APP_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match src-tauri/tauri.conf.json version $APP_VERSION" >&2
            exit 1
          fi

      - name: Build frontend
        run: npm run build

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  publish:
    name: Build ${{ matrix.name }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            rustTargets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - name: Windows x64
            platform: windows-latest
            rustTargets: ""
            args: ""
          - name: Linux x64
            platform: ubuntu-22.04
            rustTargets: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify updater signing secret
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "Missing GitHub secret TAURI_SIGNING_PRIVATE_KEY. Add the updater private key before publishing a release." >&2
            exit 1
          fi

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: iPhoneLabelPrinter v__VERSION__
          releaseBody: |
            Internal iPhoneLabelPrinter desktop build.

            Validate with the checklist in docs/release-validation.md after installing this release.
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          args: ${{ matrix.args }} --config src-tauri/tauri.updater.conf.json
